name: Deploy odeaworks.com

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-odeaworks
  cancel-in-progress: false

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Hetzner (connorodea)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout (for contact-api files)
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          if [[ -z "${{ secrets.HETZNER_CO_HOST }}" ]]; then
            echo "ERROR: HETZNER_CO_HOST secret is not set" >&2
            exit 1
          fi
          if [[ -z "${{ secrets.HETZNER_CO_USER }}" ]]; then
            echo "ERROR: HETZNER_CO_USER secret is not set" >&2
            exit 1
          fi
          if [[ -z "${{ secrets.HETZNER_CO_SSH_KEY }}" ]]; then
            echo "ERROR: HETZNER_CO_SSH_KEY secret is not set" >&2
            exit 1
          fi
          echo "All required secrets present."

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_CO_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$SSH_PORT" -H "${{ secrets.HETZNER_CO_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync dist to VPS
        run: |
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT} -o StrictHostKeyChecking=no" \
            dist/ \
            "${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/odeaworks.com/dist-incoming/"

      - name: Rsync contact-api to VPS
        run: |
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT} -o StrictHostKeyChecking=no" \
            contact-api/server.mjs contact-api/package.json \
            "${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}:/var/www/odeaworks-api/"

      - name: Run deploy script on VPS
        run: |
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key \
            -p "${SSH_PORT}" \
            -o StrictHostKeyChecking=no \
            "${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}" \
            'bash /var/www/odeaworks.com/deploy.sh'

      - name: Deploy contact-api on VPS
        run: |
          SSH_PORT="${{ secrets.HETZNER_CO_PORT }}"
          SSH_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key \
            -p "${SSH_PORT}" \
            -o StrictHostKeyChecking=no \
            "${{ secrets.HETZNER_CO_USER }}@${{ secrets.HETZNER_CO_HOST }}" \
            'cd /var/www/odeaworks-api && npm install --omit=dev && systemctl restart odeaworks-api && systemctl status odeaworks-api --no-pager'
