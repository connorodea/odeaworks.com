name: Generate Blog Post

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8am UTC
  workflow_dispatch:
    inputs:
      keyword_override:
        description: 'Optional keyword to target (must match keyword-bank.json or will be used as custom)'
        required: false

concurrency:
  group: generate-blog-post
  cancel-in-progress: false

jobs:
  generate:
    name: Generate & Publish Blog Post
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        run: cd scripts && npm install

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KEYWORD_OVERRIDE: ${{ inputs.keyword_override }}
        run: node scripts/generate-blog-post.mjs

      - name: Build site to verify post
        run: npm ci && npm run build

      - name: Commit and push
        run: |
          git config user.name "Odea Works Blog"
          git config user.email "blog@odeaworks.com"
          git add src/content/blog/ scripts/keyword-bank.json
          if git diff --cached --quiet; then
            echo "No new post generated"
            exit 0
          fi
          SLUG=$(git diff --cached --name-only | grep 'src/content/blog/' | head -1 | xargs basename | sed 's/\.md$//')
          git commit --author="connor odea <connor@quicklotz.com>" -m "blog: publish ${SLUG}"
          git push
