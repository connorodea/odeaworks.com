# nginx config for odeaworks.com (primary site)
# Static Astro site — HTML/CSS/assets served directly
# Managed by: CI/CD (GitHub Actions → rsync → reload)
# SSL: managed by Certbot (added automatically on first run)

server {
    listen 80;
    listen [::]:80;
    server_name odeaworks.com www.odeaworks.com;
    # Certbot will add HTTPS redirect here
    return 301 https://odeaworks.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name odeaworks.com www.odeaworks.com;

    # Certbot will populate these
    # ssl_certificate /etc/letsencrypt/live/odeaworks.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/odeaworks.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/odeaworks.com/html;
    index index.html;

    # Canonical: redirect www → apex
    if ($host = www.odeaworks.com) {
        return 301 https://odeaworks.com$request_uri;
    }

    # Security headers (supplement global security.conf)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # Static file routing
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Astro hashed assets (e.g. /_astro/*.hash.css) — immutable 1-year cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        access_log off;
    }

    # HTML pages — no cache (always fresh)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Other static assets (fonts, images) — moderate cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # robots.txt and sitemap — short cache
    location ~* (robots\.txt|sitemap\.xml)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
