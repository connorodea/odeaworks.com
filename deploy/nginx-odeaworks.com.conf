# nginx config for odeaworks.com (primary site)
# Static Astro site - HTML/CSS/assets served directly
# Managed by: CI/CD (GitHub Actions -> rsync -> systemctl reload nginx)
# SSL: Let's Encrypt via Certbot

server {
    listen 80;
    listen [::]:80;
    server_name odeaworks.com www.odeaworks.com;
    return 301 https://odeaworks.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name odeaworks.com www.odeaworks.com;

    ssl_certificate /etc/letsencrypt/live/odeaworks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/odeaworks.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/odeaworks.com/html;
    index index.html;

    # Canonical: redirect www -> apex
    if ($host = www.odeaworks.com) {
        return 301 https://odeaworks.com$request_uri;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff
        font/woff2;

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Astro hashed assets (/_astro/*.hash.css etc) - immutable 1-year cache
    # Note: add_header in child blocks suppresses parent-level add_header,
    # so security headers are repeated in every location block.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        access_log off;
    }

    # Static assets - moderate cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    # HTML pages - no cache, full security headers
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # robots.txt and sitemap
    location ~* (robots\.txt|sitemap\.xml)$ {
        expires 1d;
        add_header Cache-Control "public" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Default - all other routes (clean URLs, directory indexes)
    location / {
        try_files $uri $uri/ $uri.html =404;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # Custom 404
    error_page 404 /404.html;
    location = /404.html {
        internal;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "no-cache" always;
    }
}
