# nginx config for Odea redirect domains
# All three domains permanently redirect to odeaworks.com
# Domains: odeaenterprises.com, odeaengineering.com, odeaco.com
# SSL: managed by Certbot

server {
    listen 80;
    listen [::]:80;
    server_name
        odeaenterprises.com www.odeaenterprises.com
        odeaengineering.com www.odeaengineering.com
        odeaco.com www.odeaco.com;
    return 301 https://odeaworks.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name
        odeaenterprises.com www.odeaenterprises.com
        odeaengineering.com www.odeaengineering.com
        odeaco.com www.odeaco.com;

    # Certbot will populate SSL config per domain.
    # Because multiple domains share this block, Certbot will typically
    # split this into separate server blocks when it runs.
    # ssl_certificate ...
    # ssl_certificate_key ...

    return 301 https://odeaworks.com$request_uri;
}
