# nginx config for crm.odeaworks.com
# Lightweight CRM dashboard — password protected, proxies to Node.js on :3120
# SSL: Let's Encrypt via Certbot
# Auth: nginx Basic Auth (htpasswd)

server {
    listen 80;
    listen [::]:80;
    server_name crm.odeaworks.com;
    return 301 https://crm.odeaworks.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.odeaworks.com;

    ssl_certificate /etc/letsencrypt/live/crm.odeaworks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.odeaworks.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Basic Auth — protects entire CRM
    auth_basic "Odea Works CRM";
    auth_basic_user_file /etc/nginx/.htpasswd-crm;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy everything to the CRM Node.js server
    location / {
        proxy_pass http://127.0.0.1:3120;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
        proxy_buffering off;
    }
}
